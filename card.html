<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TGFC Card</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; background: #0d1f35; }
  .card { position: relative; width: 1080px; height: 1080px; overflow: hidden; }
  .photo { position: absolute; inset: 0; background-size: cover; background-position: center; background-repeat: no-repeat; }
  .overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.08) 0%, rgba(0,0,0,0.04) 35%, rgba(0,0,0,0.50) 60%, rgba(0,0,0,0.85) 100%); }
  .overlay-left { position: absolute; inset: 0; background: linear-gradient(to right, rgba(0,0,0,0.25) 0%, transparent 55%); }

  .logo-badge {
    position: absolute;
    top: 44px;
    right: 48px;
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.28);
    border-radius: 60px;
    padding: 10px 22px 10px 14px;
  }
  .logo-img { width: 36px; height: 36px; object-fit: contain; }
  .logo-text { font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 700; color: #ffffff; letter-spacing: 0.5px; line-height: 1.25; text-transform: uppercase; }

  /* Stack from bottom up — each element at a fixed bottom value */
  /* URL: 44px from bottom ~20px tall */
  .url-row { position: absolute; bottom: 44px; left: 48px; right: 48px; display: flex; align-items: center; justify-content: space-between; }
  .url { font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.40); letter-spacing: 1.5px; text-transform: uppercase; }
  .corner-accent { width: 32px; height: 32px; border-right: 2px solid rgba(211,100,128,0.45); border-bottom: 2px solid rgba(211,100,128,0.45); }

  /* State: 44 + 20 + 16gap = 80px from bottom, ~22px tall */
  .state-name { position: absolute; bottom: 80px; left: 48px; font-family: 'Montserrat', sans-serif; font-size: 16px; font-weight: 400; color: rgba(255,255,255,0.65); letter-spacing: 3px; text-transform: uppercase; }

  /* City: 80 + 22 + 12gap = 114px from bottom, 86px * 0.92 = ~80px tall */
  .city-name { position: absolute; bottom: 114px; left: 48px; font-family: 'Playfair Display', Georgia, serif; font-size: 86px; font-weight: 900; color: #ffffff; line-height: 0.92; letter-spacing: -1px; text-shadow: 0 4px 24px rgba(0,0,0,0.4); }

  /* Label: 114 + 80 + 12gap = 206px from bottom, ~20px tall */
  .location-label { position: absolute; bottom: 206px; left: 48px; font-family: 'Montserrat', sans-serif; font-size: 14px; font-weight: 600; color: #D36480; letter-spacing: 4px; text-transform: uppercase; }

  /* Divider: 206 + 20 + 14gap = 240px from bottom, 2px tall */
  .divider { position: absolute; bottom: 240px; left: 48px; width: 40px; height: 2px; background: #D36480; border-radius: 2px; }

  /* Tagline: 240 + 2 + 16gap = 258px from bottom, ~60px tall (2 lines at 22px * 1.4) */
  .tagline { position: absolute; bottom: 258px; left: 48px; right: 48px; font-family: 'Playfair Display', Georgia, serif; font-size: 22px; font-weight: 400; font-style: italic; color: rgba(255,255,255,0.85); line-height: 1.4; max-width: 600px; }
</style>
</head>
<body>
<div class="card">
  <div class="photo" id="photo"></div>
  <div class="overlay"></div>
  <div class="overlay-left"></div>

  <div class="logo-badge">
    <img class="logo-img" src="./logo.png" alt="TGFC logo" id="logo-img">
    <div class="logo-text">Greetings<br>From Co</div>
  </div>

  <div class="tagline" id="tagline">Where the music never stops and the memories last forever.</div>
  <div class="divider"></div>
  <div class="location-label" id="label">Greetings from</div>
  <div class="city-name" id="city">Nashville</div>
  <div class="state-name" id="state">Tennessee, USA</div>
  <div class="url-row">
    <div class="url">thegreetingsfromco.com</div>
    <div class="corner-accent"></div>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const city = params.get('city') || 'Nashville';
  const state = params.get('state') || 'Tennessee';
  const label = params.get('label') || 'Greetings from';
  const tagline = params.get('tagline') || 'Where the music never stops and the memories last forever.';
  const photoUrl = params.get('photo_url') || '';

  document.getElementById('city').textContent = city;
  document.getElementById('state').textContent = state + ', USA';
  document.getElementById('label').textContent = label;
  document.getElementById('tagline').textContent = tagline;

  if (photoUrl) {
    document.getElementById('photo').style.backgroundImage = `url('${decodeURIComponent(photoUrl)}')`;
  } else {
    document.getElementById('photo').style.background = 'linear-gradient(160deg, #1a3a5c 0%, #2b6cb0 40%, #7c3d52 80%, #1a1a2e 100%)';
  }

  const logoImg = document.getElementById('logo-img');
  logoImg.onerror = function() { this.style.display = 'none'; };
</script>
</body>
</html>
